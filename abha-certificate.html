<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مولّد شهادات أبها الأهلية</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">

<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'Tajawal',sans-serif;
    background:linear-gradient(160deg,#0c353a,#08252a);
    color:#eaf2f2; min-height:100vh; padding:28px 16px;
    display:flex; flex-direction:column; align-items:center; gap:24px;
  }
  .panel{
    width:100%; max-width:560px;
    background:rgba(255,255,255,.05);
    border:1px solid rgba(255,255,255,.12);
    border-radius:16px; padding:22px 24px;
  }
  .panel h1{font-size:1.25rem;font-weight:800}
  .panel .desc{font-size:.85rem;opacity:.7;margin:4px 0 16px;line-height:1.7}
  label{display:block;font-size:.82rem;font-weight:700;margin-bottom:6px;opacity:.9}
  input[type=text]{
    width:100%; background:rgba(0,0,0,.25);
    border:1px solid rgba(255,255,255,.2); border-radius:10px;
    padding:13px 14px; color:#fff; font-family:'Tajawal',sans-serif;
    font-size:1.1rem; outline:none; transition:border-color .2s;
  }
  input[type=text]:focus{border-color:#1a7a82}
  .btns{display:flex;gap:12px;margin-top:18px}
  button{
    border:none;border-radius:10px;padding:14px;
    font-family:'Tajawal',sans-serif;font-size:1rem;font-weight:700;
    cursor:pointer;transition:transform .15s;
  }
  button:active{transform:scale(.97)}
  button:disabled{opacity:.5;cursor:default}
  .btn-pdf{flex:1;background:linear-gradient(135deg,#1a7a82,#0c4a50);color:#fff}
  .btn-png{flex:1;background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.2)}

  .adjust-toggle{
    width:100%;margin-top:14px;background:none;border:1px dashed rgba(255,255,255,.25);
    color:#cfe0df;font-size:.85rem;padding:10px;border-radius:10px;
  }
  .adjust{display:none;margin-top:12px;background:rgba(0,0,0,.2);border-radius:12px;padding:14px}
  .adjust.open{display:block}
  .srow{margin-bottom:10px}
  .srow:last-child{margin-bottom:0}
  .srow label{font-size:.75rem;opacity:.75;margin-bottom:3px;display:flex;justify-content:space-between}
  .srow label span{opacity:.6}
  input[type=range]{width:100%;accent-color:#1a7a82}

  .cert-wrap{width:100%;max-width:1000px;display:flex;justify-content:center}

  .student-name{
    position:absolute; transform:translateY(-50%);
    font-family:'Amiri',serif; font-weight:700; color:#1a1a1a;
    white-space:nowrap; text-align:right;
  }
</style>
</head>
<body>

  <div class="panel">
    <h1>مولّد شهادات الشكر والتقدير</h1>
    <div class="desc">اكتب اسم الطالب ثم نزّل الشهادة. لو الاسم مو بمكانه افتح «ضبط الموضع».</div>

    <label for="name">اسم الطالب</label>
    <input id="name" type="text" placeholder="اكتب اسم الطالب" oninput="upd()">

    <div class="btns">
      <button class="btn-pdf" id="bp" onclick="dl('pdf')">تنزيل PDF</button>
      <button class="btn-png" id="bn" onclick="dl('png')">تنزيل صورة</button>
    </div>

    <button class="adjust-toggle" onclick="document.getElementById('adj').classList.toggle('open')">⚙︎ ضبط الموضع</button>
    <div class="adjust" id="adj">
      <div class="srow">
        <label>أفقي (قرب من الشرطة) <span id="vx"></span></label>
        <input type="range" id="x" min="0.50" max="0.95" step="0.005" value="0.755" oninput="upd()">
      </div>
      <div class="srow">
        <label>رأسي (الارتفاع) <span id="vy"></span></label>
        <input type="range" id="y" min="0.30" max="0.65" step="0.005" value="0.460" oninput="upd()">
      </div>
      <div class="srow">
        <label>حجم الخط <span id="vs"></span></label>
        <input type="range" id="s" min="0.025" max="0.060" step="0.001" value="0.031" oninput="upd()">
      </div>
    </div>
  </div>

  <div class="cert-wrap">
    <div class="certificate" id="cert">
      <div class="student-name" id="o-name"></div>
    </div>
  </div>

<script>
  const IMG_W = 1866, IMG_H = 1288;
  const el = id => document.getElementById(id);
  const bg = new Image();
  const bgReady = new Promise(res => { bg.onload = res; });
  bg.src = getComputedStyle(el('cert')).backgroundImage.slice(5,-2).replace(/^["']|["']$/g,'');

  const P = () => ({ right:+el('x').value, y:+el('y').value, fs:+el('s').value });

  function upd(){
    const p = P();
    const v = el('name').value.trim();
    const n = el('o-name');
    n.textContent = v || 'اكتب الاسم هنا';
    n.style.opacity = v ? '1' : '0.3';
    n.style.right = ((1-p.right)*100) + '%';
    n.style.top   = (p.y*100) + '%';
    el('vx').textContent = p.right.toFixed(3);
    el('vy').textContent = p.y.toFixed(3);
    el('vs').textContent = p.fs.toFixed(3);
    syncSize();
  }
  function syncSize(){
    el('o-name').style.fontSize = (P().fs * el('cert').clientWidth) + 'px';
  }
  window.addEventListener('resize', syncSize);
  upd();

  function safeName(){return (el('name').value||'certificate').trim().replace(/\s+/g,'_');}

  async function renderCanvas(){
    const p = P();
    const fs = Math.round(p.fs * IMG_W);
    try{ await document.fonts.load('700 ' + fs + 'px Amiri'); await document.fonts.ready; }catch(e){}
    await bgReady;
    const c = document.createElement('canvas');
    c.width = IMG_W; c.height = IMG_H;
    const ctx = c.getContext('2d');
    ctx.drawImage(bg, 0, 0, IMG_W, IMG_H);
    ctx.direction = 'rtl';
    ctx.textAlign = 'right';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = '#1a1a1a';
    ctx.font = '700 ' + fs + 'px Amiri';
    ctx.fillText(el('name').value || '', IMG_W*p.right, IMG_H*p.y);
    return c;
  }

  async function dl(type){
    el('bp').disabled = el('bn').disabled = true;
    try{
      const canvas = await renderCanvas();
      if(type==='png'){
        const a=document.createElement('a');
        a.href=canvas.toDataURL('image/png');
        a.download='شهادة_'+safeName()+'.png'; a.click();
      }else{
        const {jsPDF}=window.jspdf;
        const pdf=new jsPDF({orientation:'landscape',unit:'px',format:[IMG_W,IMG_H]});
        pdf.addImage(canvas.toDataURL('image/jpeg',0.95),'JPEG',0,0,IMG_W,IMG_H);
        pdf.save('شهادة_'+safeName()+'.pdf');
      }
    } finally {
      el('bp').disabled = el('bn').disabled = false;
    }
  }
</script>
</body>
</html>
